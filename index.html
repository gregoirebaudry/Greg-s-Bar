<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocktail Bar menu</title>
  <meta name="theme-color" content="#1a1f2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cocktail Bar">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --background: #1a1f2e;
      --foreground: #f5f5f0;
      --card: #222839;
      --card-foreground: #f5f5f0;
      --primary: #d4a853;
      --primary-foreground: #1a1f2e;
      --secondary: #2a3142;
      --muted: #323847;
      --muted-foreground: #9ca3af;
      --border: #3d4556;
      --input: #2a3142;
      --radius: 0.5rem;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      line-height: 1.6;
      min-height: 100vh;
    }

    .font-serif {
      font-family: 'Playfair Display', Georgia, serif;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: rgba(26, 31, 46, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .header-content {
      max-width: 80rem;
      margin: 0 auto;
      padding: 1.1rem 1rem 0.85rem;
    }

    /* Logo */
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      justify-self: center;
      width: 100%;
      text-align: center;
      margin-bottom: 1rem;
      padding-inline: 0.5rem;
    }

    .logo {
      width: min(76vw, 900px);
      height: auto;
      max-height: 182px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.35));
    }

    @media (max-width: 640px) {
      .header-content {
        padding: 1rem 0.75rem;
      }

      .logo-container {
        margin-bottom: 0.75rem;
      }

      .logo {
        width: min(78vw, 560px);
        max-height: 100px;
      }
    }

    /* Search */
    .search-container {
      position: relative;
      width: 100%;
      margin-bottom: 1rem;
    }

    .search-clear {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 2rem;
      height: 2rem;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      line-height: 1;
    }

    .search-clear.visible {
      display: inline-flex;
    }

    .search-clear:hover {
      color: var(--foreground);
      background: rgba(255,255,255,0.06);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.25rem;
      height: 1.25rem;
      color: var(--muted-foreground);
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 3rem 0.75rem 3rem;
      background-color: var(--input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--foreground);
      font-size: 1rem;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(212, 168, 83, 0.25);
    }

    .search-input::placeholder {
      color: var(--muted-foreground);
    }

    /* Sort Buttons */
    .sort-container {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      white-space: nowrap;
      padding-bottom: 0.1rem;
    }

    .sort-container::-webkit-scrollbar {
      display: none;
    }

    .sort-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background-color: var(--input);
      color: var(--muted-foreground);
    }

    .sort-btn {
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius);
      font-size: 0.82rem;
      white-space: nowrap;
      flex: 0 0 auto;
      font-weight: 500;
      border: 1px solid var(--border);
      background-color: var(--input);
      color: var(--foreground);
      cursor: pointer;
      transition: all 0.2s;
    }

    .sort-btn:hover {
      border-color: rgba(212, 168, 83, 0.5);
      color: var(--primary);
    }

    .sort-btn.active {
      background-color: var(--primary);
      color: var(--primary-foreground);
      border-color: var(--primary);
    }

    /* Result Count */
    @media (max-width: 640px) {
      .header-content {
        padding: 0.9rem 0.75rem 0.75rem;
      }

      .logo {
        width: min(100%, 76vw);
        max-height: 94px;
      }

      .logo-container {
        margin-bottom: 0.5rem;
      }

      .search-container {
        margin-bottom: 0.75rem;
      }
    }

    
    .session-counter {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      justify-content: center;
    }

    .session-counter-icon {
      font-size: 1rem;
      line-height: 1;
    }

    .session-counter-number.bump {
      animation: orderCountPulse 420ms ease;
    }

    .bar-sign-orders {
      margin-top: 0.15rem;
      font-size: 0.72rem;
      opacity: 0.95;
    }

    .bar-sign-orders .highlight {
      color: inherit;
    }

    @keyframes orderCountPulse {
      0% { transform: scale(1); }
      35% { transform: scale(1.28); }
      100% { transform: scale(1); }
    }

.result-count {
      margin-top: 0.85rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted-foreground);
    }

    .result-count .highlight {
      color: var(--primary);
      font-weight: 600;
    }


    .pending-orders-panel {
      max-width: 80rem;
      margin: 0 auto 1rem;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: rgba(31, 39, 55, 0.72);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    }

    .pending-orders-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.85rem;
    }

    .pending-orders-title {
      margin: 0;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.25rem;
    }

    .pending-orders-subtitle {
      margin: 0.15rem 0 0;
      color: var(--muted-foreground);
      font-size: 0.88rem;
    }

    .pending-orders-badge {
      min-width: 2rem;
      height: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(212, 168, 83, 0.18);
      border: 1px solid rgba(212, 168, 83, 0.4);
      color: var(--primary);
      font-weight: 700;
    }

    .pending-orders-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.85rem;
    }

    .pending-order-card {
      border: 1px solid var(--border);
      border-radius: 0.9rem;
      background: rgba(15, 23, 42, 0.55);
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .pending-order-topline {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .pending-order-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .pending-order-meta {
      color: var(--muted-foreground);
      font-size: 0.8rem;
    }

    .pending-order-cocktail {
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .pending-order-actions {
      margin-top: 0.15rem;
      display: flex;
      justify-content: flex-end;
    }

    .pending-order-btn {
      border: 1px solid rgba(125, 180, 132, 0.45);
      background: rgba(69, 151, 92, 0.18);
      color: #dff7e6;
      border-radius: 999px;
      padding: 0.45rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .pending-order-btn:hover {
      border-color: rgba(125, 180, 132, 0.75);
      background: rgba(69, 151, 92, 0.28);
    }

    
    .pending-counter-toggle {
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.15rem;
      margin-left: 0;
      padding: 0.2rem 0 0;
      border: 0;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      min-width: 11rem;
      width: 100%;
    }

    .pending-counter-toggle:hover .pending-counter-copy {
      color: var(--foreground);
    }

    .pending-counter-toggle:hover .pending-counter-number,
    .pending-counter-toggle:focus-visible .pending-counter-number,
    .pending-counter-toggle[data-open="true"] .pending-counter-number {
      color: var(--primary);
    }

    .pending-counter-icon {
      font-size: 1.15rem;
      line-height: 1;
    }

    .pending-counter-copy {
      font-size: 0.68rem;
      line-height: 0.98;
      text-align: left;
      color: var(--muted-foreground);
    }

    .pending-counter-number {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 0.95;
      min-width: 1.6ch;
      text-align: right;
    }

    .pending-counter-summary {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.45rem;
      width: 100%;
    }

    .pending-counter-chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      font-size: 0.85rem;
      color: var(--muted-foreground);
      transform: rotate(0deg);
      transition: transform 0.18s ease, color 0.18s ease;
      margin-left: 0.1rem;
    }

    .pending-counter-toggle:hover .pending-counter-chevron,
    .pending-counter-toggle:focus-visible .pending-counter-chevron {
      color: var(--foreground);
    }

    .pending-counter-toggle[data-open="true"] .pending-counter-chevron {
      transform: rotate(90deg);
      color: var(--foreground);
    }

    .pending-counter-inline-details {
      display: none;
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.45rem 0.55rem;
      font-size: 0.7rem;
      line-height: 1.3;
      color: var(--foreground);
      text-align: left;
      background: rgba(26, 31, 46, 0.98);
      border: 1px solid rgba(212, 168, 83, 0.18);
      border-radius: 0.6rem;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      position: relative;
      z-index: 3;
    }

    .pending-counter-toggle[data-open="true"] .pending-counter-inline-details {
      display: block;
    }

    .pending-inline-order {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      max-width: none;
      margin-top: 0.18rem;
    }

    .pending-inline-empty {
      font-style: italic;
    }

    .pending-orders-panel[data-open="false"] .pending-orders-list {
      display: none;
    }

    .pending-orders-panel[data-open="false"] .pending-orders-header {
      margin-bottom: 0;
    }

.pending-orders-empty {
      color: var(--muted-foreground);
      padding: 0.4rem 0;
      font-size: 0.9rem;
    }

    /* Main Content */
    main {
      max-width: 80rem;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* Grid */
    .cocktail-grid {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .cocktail-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .cocktail-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Card */
    .cocktail-card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      transition: all 0.3s;
      animation: fadeIn 0.4s ease-out forwards;
      opacity: 0;
    }

    .cocktail-card:hover {
      border-color: rgba(212, 168, 83, 0.5);
      box-shadow: 0 10px 40px rgba(212, 168, 83, 0.1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Card Image */
    .card-image-container {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background-color: var(--secondary);
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .cocktail-card:hover .card-image {
      transform: scale(1.05);
    }

    @media (max-width: 640px) {
      .card-image-container {
        aspect-ratio: 16/10;
        max-height: 155px;
      }

      .card-content {
        padding: 1rem;
      }
    }

    .card-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .card-placeholder svg {
      width: 4rem;
      height: 4rem;
      color: var(--muted-foreground);
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(26, 31, 46, 0.9);
      backdrop-filter: blur(4px);
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 500;
      color: #ffffff;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Card Content */
    .card-content {
      padding: 1.25rem;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--primary);
      margin: 0;
      text-wrap: balance;
      min-width: 0;
      flex: 1 1 auto;
    }

    /* Ingredients */
    .ingredients-list {
      list-style: none;
      margin-bottom: 0.75rem;
    }

    .ingredient-item {
      display: flex;
      align-items: flex-start;
      gap: 0.375rem;
      font-size: 0.875rem;
      line-height: 1.4;
      color: var(--muted-foreground);
      margin-bottom: 0.125rem;
    }

    .ingredient-bullet {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background-color: var(--primary);
      margin-top: 0.5rem;
      flex-shrink: 0;
    }

    .more-ingredients {
      font-size: 0.875rem;
      color: rgba(212, 168, 83, 0.8);
    }

    .ingredients-toggle {
      margin-top: 0.25rem;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      font-size: 0.8rem;
      color: var(--primary);
      cursor: pointer;
    }

    .ingredients-toggle:hover {
      text-decoration: underline;
    }

    .card-body-top {
      display: grid;
      grid-template-columns: minmax(92px, 108px) minmax(0, 1fr);
      gap: 0.9rem;
      align-items: start;
      margin-bottom: 0.9rem;
    }

    .card-image-container {
      aspect-ratio: 4/5;
      border-radius: 0.75rem;
    }

    .ingredients-panel {
      min-width: 0;
    }

    .ingredients-title {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 0.45rem;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .card-body-top {
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 0.75rem;
      }

      .card-content {
        padding: 0.95rem;
      }
    }

    /* Description */
    .description {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      line-height: 1.4;
      margin: 0;
      white-space: pre-line;
      cursor: default;
    }

    .description.collapsed {
      display: block;
      overflow: visible;
    }

    .read-more {
      display: none !important;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem;
      text-align: center;
    }

    .empty-state svg {
      width: 4rem;
      height: 4rem;
      color: var(--muted-foreground);
      margin-bottom: 1rem;
    }

    .empty-state h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      color: var(--foreground);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: var(--muted-foreground);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1rem;
      margin-top: 2rem;
      text-align: center;
    }

    footer p {
      font-size: 0.875rem;
      color: var(--muted-foreground);
    }
  

    .top-controls {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 0;
      flex: 0 0 auto;
    }

    .header-top-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: start;
      gap: 0.65rem;
      margin-bottom: 0.6rem;
    }

    .logo-container {
      margin-bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 0;
      padding-inline: 0;
    }

    .header-counters {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 0.3rem;
      min-width: 11rem;
      width: 11rem;
      justify-self: end;
    }

    .header-counters .bar-sign-orders {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted-foreground);
    }

    .header-counters .session-counter-icon {
      font-size: 1.45rem;
      line-height: 1;
      filter: none;
    }

    .header-counters .bar-sign-orders-copy {
      font-size: 0.68rem;
      line-height: 0.98;
      text-align: left;
      color: var(--muted-foreground);
    }

    .header-counters .session-counter-number {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 0.95;
      min-width: 1.8ch;
      text-align: right;
    }

    .bar-sign {
      border: 1px solid rgba(212, 168, 83, 0.40);
      background: rgba(255,255,255,0.02);
      color: var(--foreground);
      border-radius: 999px;
      padding: 0.42rem 0.24rem;
      width: 2.1rem;
      min-width: 2.1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s ease, background 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      align-self: center;
    }

    .bar-sign:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
      box-shadow: 0 12px 24px rgba(0,0,0,0.28);
    }

    .bar-sign-status {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.34rem;
      height: 2.95rem;
      min-width: 1.34rem;
      border-radius: 999px;
      flex-shrink: 0;
      font-size: 0;
      line-height: 0;
      border: 1px solid rgba(255,255,255,0.14);
      box-sizing: border-box;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .bar-sign-status::after {
      content: '';
      position: absolute;
      top: 0.12rem;
      left: 50%;
      width: 0.9rem;
      height: 0.9rem;
      border-radius: 999px;
      background: #fff7e6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
      transform: translateX(-50%);
      transition: transform 0.22s ease, background 0.2s ease;
    }

    .bar-sign.open {
      background: linear-gradient(180deg, rgba(164, 214, 177, 0.24) 0%, rgba(164, 214, 177, 0.14) 100%);
      border-color: rgba(125, 180, 132, 0.55);
    }

    .bar-sign.open .bar-sign-status {
      background: rgba(69, 151, 92, 0.38);
      border-color: rgba(69, 151, 92, 0.65);
    }

    .bar-sign.open .bar-sign-status::after {
      transform: translate(-50%, 1.8rem);
      background: #f7fff5;
    }

    .bar-sign.closed {
      background: linear-gradient(180deg, rgba(212, 110, 110, 0.18) 0%, rgba(212, 110, 110, 0.10) 100%);
      border-color: rgba(212, 110, 110, 0.42);
    }

    .bar-sign.closed .bar-sign-status {
      background: rgba(175, 63, 63, 0.28);
      border-color: rgba(228, 107, 115, 0.62);
    }

  <script>
    function createBrowserBarApi({ fetchImpl, baseUrl }) {
      const requestJson = async (path, options = {}) => {
        const response = await fetchImpl(`${baseUrl}${path}`, {
          cache: 'no-store',
          ...options
        });
        const payload = await response.json().catch(() => ({}));
        return { response, payload };
      };

      return {
        getCocktails() {
          return requestJson('/api/cocktails', { method: 'GET' });
        },
        getBarState() {
          return requestJson('/api/bar-state', { method: 'GET' });
        },
        getAdminSession(token) {
          return requestJson(`/api/admin-session?token=${encodeURIComponent(token)}`, { method: 'GET' });
        },
        toggleBar(credentials) {
          return requestJson('/api/bar-state/toggle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(credentials)
          });
        },
        submitOrder(order) {
          return requestJson('/api/order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(order)
          });
        },
        completeOrder(payload) {
          return requestJson('/api/orders/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }
      };
    }

    function createRealBrowserBarApi(config) {
      return createBrowserBarApi({
        fetchImpl: (...args) => window.fetch(...args),
        baseUrl: config.BASE_URL
      });
    }

    const barApi = createRealBrowserBarApi({ BASE_URL: 'https://gregs-bar.onrender.com' });

    // Cocktails are loaded from ./cocktail.json
    // Keep cocktail.json in the same folder as index.html and admin.html.
    let cocktails = [];

    let currentSort = 'name';
    let searchQuery = '';

    const BAR_CONFIG = {
      Greg: {
        password: 'Tom Collins',
        headerAlt: "Greg's Bar",
        logo: "images/logos/greg-logo.png"
      },
      Clement: {
        password: 'Chartreuse',
        headerAlt: "Clement's Lounge",
        logo: "images/logos/clement-logo.png"
      },
      Bastien: {
        password: 'Belle Bulle',
        headerAlt: "Bastien's Bar",
        logo: "images/logos/bastien-logo.png"
      }
    };

    let barState = { isOpen: false, barman: null, sessionOrders: 0, pendingOrders: [] };
    let pendingCocktail = null;
    let isPendingOrdersOpen = false;
    let uiBusy = false;
    let uiBusyMessage = '';
    const ADMIN_SESSION_STORAGE_KEY = 'bar_admin_session_token';
    const SERVER_SYNC_CONFIG = {
      BASE_URL: 'https://gregs-bar.onrender.com',
      POLL_MS: 4000
    };

    const SMART_FILTER_OPTIONS = {
      spirits: {
        gin: ['gin', 'sloe gin', 'genever'],
        vodka: ['vodka'],
        whisky: ['whisky', 'whiskey', 'bourbon', 'rye', 'scotch'],

      },
      spiritLabels: {
        gin: 'Gin',
        vodka: 'Vodka',
        whisky: 'Whisky',
        tequila: 'Tequila',
        rum: 'Rum'
      }
    };

    let smartFilters = {
      spirits: [],
      spiritsAny: false,
      alcohol: '',
      taste: '',
      popularity: ''
    };

    let surpriseCocktailId = '';

    const wineGlassSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25A2.25 2.25 0 0 1 5.25 3h13.5A2.25 2.25 0 0 1 21 5.25Z"/></svg>`;


    function getCurrentBarConfig() {
      return barState.barman ? BAR_CONFIG[barState.barman] : BAR_CONFIG.Greg;
    }

    function getCurrentOrderTitle() {
      if (barState.barman === 'Clement') return "Clement's Lounge order";
      if (barState.barman === 'Bastien') return 'Bar Stoss order';
      return "Greg's Bar order";
    }

    function getStoredAdminSessionToken() {
      try {
        return window.localStorage.getItem(ADMIN_SESSION_STORAGE_KEY) || '';
      } catch (error) {
        return '';
      }
    }

    function storeAdminSessionToken(token) {
      try {
        if (token) {
          window.localStorage.setItem(ADMIN_SESSION_STORAGE_KEY, token);
        } else {
          window.localStorage.removeItem(ADMIN_SESSION_STORAGE_KEY);
        }
      } catch (error) {
        console.warn('Unable to access localStorage for admin session.', error);
      }
    }

    async function maybeResumeAdminSession() {
      const token = getStoredAdminSessionToken();
      if (!token) return false;
      try {
        const { response, payload } = await barApi.getAdminSession(token);
        if (response.ok && payload.ok && payload.active) {
          return true;
        }
      } catch (error) {
        console.warn('Unable to resume admin session.', error);
      }
      storeAdminSessionToken('');
      return false;
    }

    function slugifyCocktailName(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'cocktail';
    }

    function parseTimesMadeValue(value) {
      if (typeof value === 'number' && Number.isFinite(value)) {
        return Math.max(0, Math.floor(value));
      }
      if (typeof value === 'string') {
        const trimmed = value.trim();
        if (!trimmed) return null;
        const cleaned = trimmed.replace(/[^0-9-]/g, '');
        if (!cleaned) return null;
        const parsed = Number.parseInt(cleaned, 10);
        return Number.isFinite(parsed) ? Math.max(0, parsed) : null;
      }
      return null;
    }

    // FIX: added fast path for the already-normalized camelCase `timesMade` key
    // that the server sends, before falling back to the key-scanning loop.
    function getTimesMadeFromRecord(record, fallback = {}) {
      // Fast path: server already normalizes to camelCase `timesMade`
      const direct = record?.timesMade ?? record?.times_made ?? fallback?.timesMade ?? fallback?.times_made;
      if (direct !== undefined && direct !== null) {
        const parsed = parseTimesMadeValue(direct);
        if (parsed !== null) return parsed;
      }

      // Slow path: scan all keys after normalizing (handles arbitrary column names)
      const candidates = [];
      const sources = [record, fallback].filter(Boolean);

      sources.forEach(source => {
        Object.entries(source).forEach(([key, value]) => {
          const normalizedKey = String(key).toLowerCase().replace(/[^a-z0-9]/g, '');
          if (
            normalizedKey === 'timesmade' ||
            normalizedKey === 'times' ||
            normalizedKey === 'made' ||
            normalizedKey === 'timesmadecount' ||
            normalizedKey === 'madecount' ||
            normalizedKey === 'orderscount' ||
            normalizedKey === 'ordercount' ||
            normalizedKey === 'timesordered' ||
            normalizedKey === 'numbermade'
          ) {
            candidates.push(value);
          }
        });
      });

      for (const value of candidates) {
        const parsed = parseTimesMadeValue(value);
        if (parsed !== null) return parsed;
      }

      return 0;
    }


    function normalizeText(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, ' ')
        .trim();
    }

    function getAbvPercentFromRecord(record, fallback = {}) {
      const sources = [record, fallback].filter(Boolean);
      // Covers: original sheet key "ABV", camelCased variants the backend may produce
      // ("abv " with trailing space from "ABV", "abvPercent", "abv%", etc.)
      const exactKeys = ['ABV', 'ABV%', 'ABV', 'ABV', 'abv%', 'abv', 'abvPercent', 'abv_percent', 'abv_pct'];

      for (const source of sources) {
        for (const key of exactKeys) {
          if (source[key] !== undefined && source[key] !== null && String(source[key]).trim() !== '') {
            return String(source[key]).trim();
          }
        }

        // Fallback: scan all keys after stripping non-alphanumeric characters
        for (const [key, value] of Object.entries(source)) {
          const normalizedKey = String(key).toLowerCase().replace(/[^a-z0-9]/g, '');
          if (
            normalizedKey === 'abv' ||
            normalizedKey === 'abvpercent' ||
            normalizedKey === 'abvpct' ||
            normalizedKey === 'alcoholcontent' ||
            normalizedKey === 'alcohollevel' ||
            normalizedKey === 'strength'
          ) {
            if (value !== undefined && value !== null && String(value).trim() !== '') {
              return String(value).trim();
            }
          }
        }
      }
      return '';
    }

    function parseAbvPercent(value) {
      const text = String(value || '').replace(',', '.');
      const match = text.match(/\d+(?:\.\d+)?/);
      if (!match) return null;
      const parsed = Number.parseFloat(match[0]);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function normalizeAlcoholLevel(value) {
      const abv = parseAbvPercent(value);
      if (abv === null) return '';
      if (abv < 18) return 'light';
      if (abv < 27) return 'medium';
      return 'strong';
    }


    function normalizeCocktailRecord(raw, fallback = {}) {
      const ingredientText = Array.isArray(raw?.ingredients)
        ? raw.ingredients.join('\n')
        : typeof raw?.ingredients === 'string'
          ? raw.ingredients
          : (fallback.ingredients || '');

      return {
        id: raw?.id || fallback.id || slugifyCocktailName(raw?.name || fallback.name || ''),
        name: raw?.name || fallback.name || 'Unnamed cocktail',
        description: raw?.description || fallback.description || '',
        ingredients: ingredientText,
        timesMade: getTimesMadeFromRecord(raw, fallback),
        abvPercent: getAbvPercentFromRecord(raw, fallback),
        image: raw?.image || fallback.image || ''
      };
    }

    function normalizePendingOrders(rawOrders) {
      if (!Array.isArray(rawOrders)) return [];
      return rawOrders
        .map(order => ({
          id: String(order?.id || ''),
          guestName: String(order?.guestName || '').trim(),
          cocktailName: String(order?.cocktailName || '').trim(),
          createdAt: String(order?.createdAt || '')
        }))
        .filter(order => order.id && order.guestName && order.cocktailName);
    }

    function normalizeBarState(raw) {
      const isOpen = Boolean(raw && raw.isOpen);
      const barman = raw && typeof raw.barman === 'string' && BAR_CONFIG[raw.barman] ? raw.barman : null;
      const parsedSessionOrders = Number(raw && raw.sessionOrders);
      const sessionOrders = Number.isFinite(parsedSessionOrders) && parsedSessionOrders >= 0
        ? Math.floor(parsedSessionOrders)
        : 0;
      const pendingOrders = normalizePendingOrders(raw && raw.pendingOrders);
      return {
        isOpen: isOpen && Boolean(barman),
        barman: isOpen && barman ? barman : null,
        sessionOrders: isOpen && barman ? sessionOrders : 0,
        pendingOrders: isOpen && barman ? pendingOrders : []
      };
    }

    function formatPendingOrderTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function renderPendingOrders() {
      const toggle = document.getElementById('pendingCounterToggle');
      const details = document.getElementById('pendingCounterDetails');
      const counter = document.getElementById('pendingCounterCount');
      if (!toggle || !details || !counter) return;

      const orders = Array.isArray(barState.pendingOrders) ? barState.pendingOrders : [];
      counter.textContent = String(orders.length);
      toggle.dataset.open = isPendingOrdersOpen ? 'true' : 'false';
      toggle.setAttribute('aria-expanded', isPendingOrdersOpen ? 'true' : 'false');

      if (!barState.isOpen || !isPendingOrdersOpen) {
        details.innerHTML = '';
        return;
      }

      if (orders.length === 0) {
        details.innerHTML = '<span class="pending-inline-empty">No pending orders.</span>';
        return;
      }

      details.innerHTML = orders.map(order => {
        const timeLabel = formatPendingOrderTime(order.createdAt);
        return `<div class="pending-inline-order">${escapeHtml(order.guestName)} - ${escapeHtml(order.cocktailName)}${timeLabel ? ` <span class="pending-order-meta">${escapeHtml(timeLabel)}</span>` : ''}</div>`;
      }).join('');
    }

    function togglePendingOrdersVisibility(event) {
      if (event) event.stopPropagation();
      if (!barState.isOpen) return;
      isPendingOrdersOpen = !isPendingOrdersOpen;
      renderPendingOrders();
    }

    function handlePendingOrdersToggleKeydown(event) {
      if (!event || (event.key !== 'Enter' && event.key !== ' ')) return;
      event.preventDefault();
      togglePendingOrdersVisibility(event);
    }

    function applyBarState(nextState) {
      const previousOpen = barState.isOpen;
      barState = normalizeBarState(nextState);
      if (!barState.isOpen) {
        isPendingOrdersOpen = false;
      } else if (!previousOpen && barState.isOpen) {
        isPendingOrdersOpen = false;
      }
      updateBarUI();
      renderPendingOrders();
      renderCocktails();
    }

    async function loadBarStateFromServer(options = {}) {
      const { silent = false } = options;

      try {
        const { response, payload } = await barApi.getBarState();

        if (!response.ok) {
          throw new Error(`Server state read failed with ${response.status}`);
        }

        const remoteState = normalizeBarState(payload && payload.state ? payload.state : payload);
        const changed = remoteState.isOpen !== barState.isOpen
          || remoteState.barman !== barState.barman
          || remoteState.sessionOrders !== barState.sessionOrders
          || JSON.stringify(remoteState.pendingOrders) !== JSON.stringify(barState.pendingOrders);

        if (changed) {
          applyBarState(remoteState);
        }

        return changed;
      } catch (error) {
        if (!silent) {
          console.warn('Unable to load bar state from the server.', error);
        }
        return false;
      }
    }

    function startBarStatePolling() {
      if (barStatePoller) return;
      barStatePoller = window.setInterval(() => {
        if (!document.hidden) {
          loadBarStateFromServer({ silent: true });
        }
      }, SERVER_SYNC_CONFIG.POLL_MS);
    }

    async function markPendingOrderServed(orderId) {
      if (!orderId) return;
      const token = getStoredAdminSessionToken();
      try {
        const { response, payload } = await barApi.completeOrder({ orderId, token });
        if (!response.ok) {
          throw new Error(payload.error || `Server returned ${response.status}`);
        }

        if (payload.state) {
          applyBarState(payload.state);
        } else {
          await loadBarStateFromServer({ silent: true });
        }
      } catch (error) {
        console.warn('Unable to mark order as served.', error);
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char]);
    }

    function setUiBusy(nextValue, message = '') {
      uiBusy = Boolean(nextValue);
      uiBusyMessage = uiBusy ? String(message || '') : '';

          sessionOrderCount.classList.remove('bump');

      document.getElementById('modalActions').innerHTML = '';
      document.getElementById('modalError').textContent = '';

    function openModal({ title, subtitle = '', subtitleHtml = '', hideTitle = false, cardClass = '', subtitleClass = '', bodyHtml = '', actions = [] }) {

      const subtitleEl = document.getElementById('modalSubtitle');
      const cardEl = document.querySelector('#modalBackdrop .modal-card');

      titleEl.textContent = title;
      titleEl.classList.toggle('is-hidden', Boolean(hideTitle));

      if (subtitleHtml) {
        subtitleEl.innerHTML = subtitleHtml;
      } else {
        subtitleEl.textContent = subtitle;
      }
      subtitleEl.className = `modal-subtitle${subtitleClass ? ` ${subtitleClass}` : ''}`;

      document.getElementById('modalBody').innerHTML = bodyHtml;
      document.getElementById('modalError').textContent = '';
      document.getElementById('modalSuccess').textContent = '';

      if (cardEl) {
        cardEl.className = `modal-card${cardClass ? ` ${cardClass}` : ''}`;

      actionsEl.innerHTML = '';

          ? 'Any valid barman credentials can close the currently open bar.'

    async function submitBarCredentials() {
      if (uiBusy) return;

      const nameInput = document.getElementById('adminNameInput');
      const passwordInput = document.getElementById('adminPasswordInput');
      const enteredName = nameInput.value.trim();
      const normalizedName = enteredName.charAt(0).toUpperCase() + enteredName.slice(1).toLowerCase();
      const config = BAR_CONFIG[normalizedName];
      if (!config || passwordInput.value !== config.password) {
        setModalError('Invalid credentials.');
        return;
      }

      const primaryBtn = document.querySelector('#modalActions .modal-btn.primary');
      if (primaryBtn) {
        primaryBtn.disabled = true;
        primaryBtn.textContent = barState.isOpen ? 'Closing...' : 'Opening...';
      }

      setUiBusy(true, 'Connecting to server... this can take a few seconds if Render is waking up.');
      setModalError('');
      setModalSuccess('Connecting to server... first load may take a few seconds.');

      try {
        const { response, payload } = await barApi.toggleBar({
          name: normalizedName,
          password: passwordInput.value
        });
        if (!response.ok) {
          throw new Error(payload.error || `Server returned ${response.status}`);
        }

        if (payload.state) {
          applyBarState(payload.state);
        }
        pendingCocktail = null;
        closeModal();

        if (payload.adminSessionToken) {
          storeAdminSessionToken(payload.adminSessionToken);
        } else {
          storeAdminSessionToken('');
        }
      } catch (error) {
        console.warn('Unable to save bar state on the server.', error);
        setModalSuccess('');
        setModalError(error.message || 'Unable to save the bar status right now.');
      } finally {
        setUiBusy(false);
        if (primaryBtn) {
          primaryBtn.disabled = false;
          primaryBtn.textContent = barState.isOpen ? 'Close bar' : 'Open bar';
        }
      }
    }

    async function loadLocalCocktails() {
      try {
        const response = await fetch('./cocktail.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Local JSON request failed with ${response.status}`);
        }

        const payload = await response.json();
        const records = Array.isArray(payload) ? payload : (Array.isArray(payload?.items) ? payload.items : []);
        if (records.length === 0) return [];

        return records.map(record => normalizeCocktailRecord(record, { image: record?.images || '' }));
      } catch (error) {
        console.warn('Unable to load cocktails from local cocktail.json.', error);
        return [];
      }
    }

    // Initialize the app
    async function loadCocktails() {
      let renderedFromLocal = false;

      const localRecords = await loadLocalCocktails();
      if (localRecords.length > 0) {
        cocktails = localRecords;
        document.getElementById('totalCount').textContent = cocktails.length;
        renderCocktails();
        renderedFromLocal = true;
      }

      try {
        const { response, payload } = await barApi.getCocktails();

        if (!response.ok) {
          throw new Error(`Cocktail API request failed with ${response.status}`);
        }

        const records = Array.isArray(payload) ? payload : (Array.isArray(payload?.items) ? payload.items : []);
        if (records.length === 0) {
          throw new Error('No cocktail records found in the backend cache.');
        }

        cocktails = records.map(record => normalizeCocktailRecord(record));
        document.getElementById('totalCount').textContent = cocktails.length;
        renderCocktails();
        return;
      } catch (error) {
        console.warn('Unable to load cocktails from the backend Google Sheet API.', error);
      }

      if (!renderedFromLocal) {
        cocktails = [];
        document.getElementById('cocktailGrid').innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: var(--muted-foreground);"> 
            <h3 style="font-size: 1.25rem; margin-bottom: 0.5rem;">📋 No cocktails available</h3>
            <p>The local cocktail.json file and the backend are both unavailable.</p>
          </div>
        `;
        return;
      }

      document.getElementById('totalCount').textContent = cocktails.length;
      renderCocktails();
    }

    function hasActiveSmartFilters() {
      return smartFilters.spirits.length > 0 || smartFilters.alcohol || smartFilters.taste || smartFilters.popularity;
    }

    function getCocktailSearchText(cocktail) {
      return normalizeText(`${cocktail.name || ''} ${cocktail.ingredients || ''} ${cocktail.description || ''}`);
    }

    function getSpiritMatches(cocktail) {
      const text = getCocktailSearchText(cocktail);
      return Object.entries(SMART_FILTER_OPTIONS.spirits).filter(([, aliases]) => {
        return aliases.some(alias => {
          const normalizedAlias = normalizeText(alias);
          const pattern = new RegExp(`(^| )${normalizedAlias.replace(/\s+/g, ' ')}( |$)`);
          return pattern.test(text);
        });
      }).map(([key]) => key);
    }

    function inferTaste(cocktail) {
      const text = getCocktailSearchText(cocktail);
      const sweetHits = ['syrup', 'honey', 'agave', 'orgeat', 'grenadine', 'liqueur', 'cream', 'coconut', 'pineapple', 'passion fruit', 'mango', 'strawberry', 'peach', 'vanilla']
        .filter(word => text.includes(normalizeText(word))).length;
      const bitterHits = ['campari', 'aperol', 'bitter', 'bitters', 'amaro', 'fernet', 'suze', 'gentian', 'grapefruit']
        .filter(word => text.includes(normalizeText(word))).length;
      if (sweetHits > bitterHits && sweetHits > 0) return 'sweet';
      if (bitterHits > sweetHits && bitterHits > 0) return 'bitter';
      return 'balanced';
    }

    function getPopularityThresholds(items) {
      const values = items.map(item => Number(item.timesMade || 0)).sort((a, b) => a - b);
      if (!values.length) return { nicheMax: 0, popularMin: 0 };
      const nicheIndex = Math.floor((values.length - 1) * 0.3);
      const popularIndex = Math.ceil((values.length - 1) * 0.7);
      return { nicheMax: values[nicheIndex], popularMin: values[popularIndex] };
    }

    function cocktailMatchesSmartFilters(cocktail, popularityThresholds) {
      if (smartFilters.spirits.length > 0) {
        const matches = getSpiritMatches(cocktail);
        if (!smartFilters.spirits.some(spirit => matches.includes(spirit))) return false;
      }
      if (smartFilters.alcohol && smartFilters.alcohol !== 'any') {
        if (normalizeAlcoholLevel(cocktail.abvPercent) !== smartFilters.alcohol) return false;
      }
      if (smartFilters.taste && smartFilters.taste !== 'any') {
        if (inferTaste(cocktail) !== smartFilters.taste) return false;
      }
      if (smartFilters.popularity === 'popular') {
        if (Number(cocktail.timesMade || 0) < popularityThresholds.popularMin) return false;
      }
      if (smartFilters.popularity === 'niche') {
        if (Number(cocktail.timesMade || 0) > popularityThresholds.nicheMax) return false;
      }
      return true;
    }

    function getFilteredCocktailsForCurrentState() {
      const query = searchQuery.toLowerCase().trim();
      const popularityThresholds = getPopularityThresholds(cocktails);

      return cocktails.filter(cocktail => {
        if (query) {
          const nameMatch = cocktail.name.toLowerCase().includes(query);
          const ingredientsMatch = cocktail.ingredients.toLowerCase().includes(query);
          const timesMadeMatch = cocktail.timesMade.toString().includes(query);
          if (!(nameMatch || ingredientsMatch || timesMadeMatch)) return false;
        }
        return cocktailMatchesSmartFilters(cocktail, popularityThresholds);
      });
    }


    function filterAndSortCocktails() {
      let filtered = getFilteredCocktailsForCurrentState();

      switch (currentSort) {
        case 'name':
          filtered.sort((a, b) => a.name.localeCompare(b.name));
          break;
        case 'most-made':
          filtered.sort((a, b) => b.timesMade - a.timesMade);
          break;
        case 'least-made':
          filtered.sort((a, b) => a.timesMade - b.timesMade);
          break;
      }

      return filtered;
    }

    function createIngredientItems(ingredients) {
      return ingredients.map(ing => `
        <li class="ingredient-item">
          <span class="ingredient-bullet"></span>
          ${ing}
        </li>
      `).join('');
    }

    function createCocktailCard(cocktail, index) {
      const ingredients = cocktail.ingredients.split('\n').filter(Boolean);

      const card = document.createElement('article');
      card.className = 'cocktail-card';
      card.dataset.cocktailId = cocktail.id;
      card.style.animationDelay = `${Math.min(index * 50, 500)}ms`;
      if (barState.isOpen) {
        card.classList.add('order-enabled');
        card.addEventListener('click', (event) => {
          if (uiBusy) return;
          if (event.target.closest('.description') || event.target.closest('.read-more')) {
            return;
          }
          promptOrderDecision(cocktail);
        });
      }

      const badge = cocktail.timesMade === 0 
        ? 'Not yet made' 
        : `Made ${cocktail.timesMade}×`;

      const imagePath = cocktail.image.startsWith('/') ? cocktail.image.slice(1) : cocktail.image;

      card.innerHTML = `
        <div class="card-content">
          <div class="card-header">
            <h2 class="card-title">${cocktail.name}</h2>
            <div class="badge">${badge}</div>
          </div>
          <div class="card-body-top">
            <div class="card-image-container">
              <img 
                src="${imagePath}" 
                alt="${cocktail.name}" 
                class="card-image"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
              >
              <div class="card-placeholder" style="display: none;">
                ${wineGlassSVG}
              </div>
            </div>
            <div class="ingredients-panel">
              <ul class="ingredients-list">${createIngredientItems(ingredients)}</ul>
            </div>
          </div>
          <div class="description-container">
            <p class="description">${cocktail.description}</p>
          </div>
        </div>
      `;

      return card;
    }



    function scrollToTopAfterSort() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderCocktails() {
      const filtered = filterAndSortCocktails();
      const grid = document.getElementById('cocktailGrid');
      const emptyState = document.getElementById('emptyState');

      document.getElementById('filteredCount').textContent = filtered.length;

      if (filtered.length === 0) {
        if (hasActiveSmartFilters()) {
          emptyState.style.display = 'none';
          grid.style.display = 'grid';
          grid.innerHTML = `
            <div class="no-smart-results">
              <h3>No cocktails match these filters</h3>
              <p>Try relaxing one filter or reset the cocktail finder.</p>
              <button type="button" onclick="resetSmartFilters()">Reset smart filters</button>
            </div>
          `;
          return;
        }
        grid.style.display = 'none';
        emptyState.style.display = 'flex';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      grid.innerHTML = '';

      if (surpriseCocktailId) {
        const surprise = filtered.find(cocktail => cocktail.id === surpriseCocktailId);
        if (surprise) {
          const surpriseCard = document.createElement('div');
          surpriseCard.className = 'surprise-card';
          surpriseCard.innerHTML = `
            <div class="surprise-card-title">✨ Surprise pick: ${escapeHtml(surprise.name)}</div>
            <div class="surprise-card-copy">Picked randomly from your current cocktail finder matches.</div>
          `;
          grid.appendChild(surpriseCard);
        }
      }

      filtered.forEach((cocktail, index) => {
        const card = createCocktailCard(cocktail, index);
        grid.appendChild(card);
      });
    }


    function getSmartFilterStep() {
      if (smartFilters.spirits.length === 0 && !smartFilters.spiritsAny) return 1;
      if (!smartFilters.alcohol) return 2;
      if (!smartFilters.taste) return 3;
      if (!smartFilters.popularity) return 4;
      return 4;
    }

    function getSmartFilterLabels() {
      const labels = [];
      if (smartFilters.spirits.length) {
        labels.push(smartFilters.spirits.map(spirit => SMART_FILTER_OPTIONS.spiritLabels[spirit] || spirit).join(' or '));
      }

      const alcoholLabels = { light: 'Low alcohol', medium: 'Medium alcohol', strong: 'Strong alcohol' };
      const tasteLabels = { sweet: 'Sweet', balanced: 'Balanced', bitter: 'Bitter' };
      const popularityLabels = { popular: 'Popular', niche: 'Niche' };

      if (smartFilters.alcohol && smartFilters.alcohol !== 'any') labels.push(alcoholLabels[smartFilters.alcohol]);
      if (smartFilters.taste && smartFilters.taste !== 'any') labels.push(tasteLabels[smartFilters.taste]);
      if (smartFilters.popularity && smartFilters.popularity !== 'any') labels.push(popularityLabels[smartFilters.popularity]);

      return labels;
    }

    function updateSmartFilterSummary() {
      const summary = document.getElementById('smartFilterSummary');
      if (!summary) return;
      const labels = getSmartFilterLabels();

      if (!labels.length) {
        summary.style.display = 'none';
        summary.innerHTML = '';
        return;
      }

      summary.style.display = 'block';
      summary.innerHTML = `Showing cocktails matching: <strong>${labels.map(escapeHtml).join(' · ')}</strong><button type="button" onclick="resetSmartFilters()">Clear</button>`;
    }

    function renderFilterChip({ label, value, group, multi = false, any = false }) {
      const active = any
        ? (group === 'spirits' ? smartFilters.spiritsAny : !smartFilters[group])
        : (multi ? smartFilters[group].includes(value) : smartFilters[group] === value);

      return `<button type="button" class="filter-chip${active ? ' active' : ''}" data-filter-group="${group}" data-filter-value="${value}" data-filter-multi="${multi ? 'true' : 'false'}" data-filter-any="${any ? 'true' : 'false'}">${escapeHtml(label)}</button>`;
    }

    function getCurrentSmartMatchCount() {
      return getFilteredCocktailsForCurrentState().length;
    }

    function openSmartFilterModal() {
      const step = getSmartFilterStep();
      const count = getCurrentSmartMatchCount();
      const canSurprise = count > 0;
      const labels = getSmartFilterLabels();

      openModal({
        title: 'Find my cocktail',
        subtitle: 'Start with a base spirit or choose Any, then refine if you want.',
        bodyHtml: `
          <div class="filter-match-count">
            <strong>${count}</strong> cocktail${count === 1 ? '' : 's'} matching${labels.length ? ` · ${labels.map(escapeHtml).join(' · ')}` : ''}
          </div>
          <div class="filter-progress-note">${step < 4 ? 'Pick an option to reveal the next filter, or show results now.' : 'You can show results, surprise yourself, or keep changing filters.'}</div>

          <div class="filter-section">
            <div class="filter-section-title">1. Base spirit</div>
            <div class="filter-chip-row">
              ${renderFilterChip({ label: 'Gin', value: 'gin', group: 'spirits', multi: true })}
              ${renderFilterChip({ label: 'Vodka', value: 'vodka', group: 'spirits', multi: true })}
              ${renderFilterChip({ label: 'Whisky', value: 'whisky', group: 'spirits', multi: true })}
              ${renderFilterChip({ label: 'Tequila', value: 'tequila', group: 'spirits', multi: true })}
              ${renderFilterChip({ label: 'Rum', value: 'rum', group: 'spirits', multi: true })}
              ${renderFilterChip({ label: 'Any', value: '', group: 'spirits', multi: true, any: true })}
            </div>
          </div>

          <div class="filter-section${step < 2 ? ' locked' : ''}">
            <div class="filter-section-title">2. Alcohol level</div>
            <div class="filter-chip-row">
              ${renderFilterChip({ label: 'Low', value: 'light', group: 'alcohol' })}
              ${renderFilterChip({ label: 'Medium', value: 'medium', group: 'alcohol' })}
              ${renderFilterChip({ label: 'Strong', value: 'strong', group: 'alcohol' })}
              ${renderFilterChip({ label: 'Any', value: '', group: 'alcohol', any: true })}
            </div>
          </div>

          <div class="filter-section${step < 3 ? ' locked' : ''}">
            <div class="filter-section-title">3. Taste</div>
            <div class="filter-chip-row">
              ${renderFilterChip({ label: 'Sweet', value: 'sweet', group: 'taste' })}
              ${renderFilterChip({ label: 'Balanced', value: 'balanced', group: 'taste' })}
              ${renderFilterChip({ label: 'Bitter', value: 'bitter', group: 'taste' })}
              ${renderFilterChip({ label: 'Any', value: '', group: 'taste', any: true })}
            </div>
          </div>

          <div class="filter-section${step < 4 ? ' locked' : ''}">
            <div class="filter-section-title">4. Popularity</div>
            <div class="filter-chip-row">
              ${renderFilterChip({ label: 'Popular', value: 'popular', group: 'popularity' })}
              ${renderFilterChip({ label: 'Niche', value: 'niche', group: 'popularity' })}
              ${renderFilterChip({ label: 'Any', value: '', group: 'popularity', any: true })}
            </div>
          </div>
        `,
        actions: [
          { label: 'Reset', onClick: () => { resetSmartFilters(false); openSmartFilterModal(); } },
          { label: 'Surprise me', disabled: !canSurprise, onClick: surpriseMeFromSmartFilters },
          { label: 'Show cocktails', primary: true, onClick: () => { closeModal(); updateSmartFilterSummary(); renderCocktails(); } }
        ]
      });

      document.querySelectorAll('#modalBody .filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const group = chip.dataset.filterGroup;
          const value = chip.dataset.filterValue;
          const multi = chip.dataset.filterMulti === 'true';
          const any = chip.dataset.filterAny === 'true';

          if (multi) {
            if (any) {
              smartFilters[group] = [];
              if (group === 'spirits') smartFilters.spiritsAny = true;
            } else if (smartFilters[group].includes(value)) {
              smartFilters[group] = smartFilters[group].filter(item => item !== value);
              if (group === 'spirits') smartFilters.spiritsAny = false;
            } else {
              smartFilters[group] = [...smartFilters[group], value];
              if (group === 'spirits') smartFilters.spiritsAny = false;
            }
          } else {
            smartFilters[group] = any ? 'any' : value;
          }

          surpriseCocktailId = '';
          openSmartFilterModal();
        });
      });
    }

    function resetSmartFilters(shouldRender = true) {
      smartFilters = { spirits: [], spiritsAny: false, alcohol: '', taste: '', popularity: '' };
      surpriseCocktailId = '';
      updateSmartFilterSummary();
      if (shouldRender) renderCocktails();
    }

    function surpriseMeFromSmartFilters() {
      const matches = getFilteredCocktailsForCurrentState();
      if (!matches.length) return;
      const pick = matches[Math.floor(Math.random() * matches.length)];
      surpriseCocktailId = pick.id;
      closeModal();
      updateSmartFilterSummary();
      renderCocktails();
      setTimeout(() => {
        const card = document.querySelector(`[data-cocktail-id="${CSS.escape(pick.id)}"]`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }

    // Event Listeners
    function syncSearchClearButton() {
      const clearBtn = document.getElementById('searchClearBtn');
      const searchInput = document.getElementById('searchInput');
      if (!clearBtn || !searchInput) return;
      clearBtn.classList.toggle('visible', searchInput.value.trim().length > 0);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      surpriseCocktailId = '';
      syncSearchClearButton();
      renderCocktails();
    });

    document.getElementById('searchClearBtn').addEventListener('click', () => {
      const searchInput = document.getElementById('searchInput');
      searchInput.value = '';
      searchQuery = '';
      syncSearchClearButton();
      searchInput.focus();
      renderCocktails();
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (uiBusy) return;
        if (btn.id === 'smartFilterBtn') {
          openSmartFilterModal();
          return;
        }
        document.querySelectorAll('.sort-btn').forEach(b => {
          if (b.id !== 'smartFilterBtn') b.classList.remove('active');
        });
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        surpriseCocktailId = '';
        renderCocktails();
        scrollToTopAfterSort();
      });
    });

    document.getElementById('barToggleBtn')?.addEventListener('click', (event) => {
      event.preventDefault();
    });
    document.getElementById('pendingCounterToggle')?.addEventListener('keydown', handlePendingOrdersToggleKeydown);
    document.getElementById('modalBackdrop').addEventListener('click', (event) => {
      if (event.target.id === 'modalBackdrop') {
        closeModal();
        pendingCocktail = null;
      }
    });

    // Initialize
    updateBarUI();
    renderCocktails();
    syncSearchClearButton();
    updateSmartFilterSummary();
    loadCocktails();
    maybeResumeAdminSession();
    loadBarStateFromServer({ silent: true });
    startBarStatePolling();
  </script>
</body>
</html>
